name: Performance safeguards

on:
  pull_request:
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      - run: npm run build
      - name: Mobile Lighthouse CI
        run: npx lhci autorun --config=lighthouserc.mobile.cjs
      - name: Desktop Lighthouse CI
        run: npx lhci autorun --config=lighthouserc.desktop.cjs
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: performance-reports/lhci
          retention-days: 14
