<section
  id="sf-cookie-inline"
  data-loaded-partial="cookie-banner"
  data-cookie-banner
  hidden
  role="dialog"
  aria-live="polite"
  aria-label="Cookie settings"
>
<div class="sfc-shell">
    <div class="sfc-copy-wrap">
      <span class="sfc-dot" aria-hidden="true"></span>

      <div class="sfc-text">
        <p class="sfc-title">Cookies on this website</p>
        <p class="sfc-copy">
          We use essential technologies to operate the website. With your permission, optional cookies may help remember preferences, measure website use or load selected external content.
        </p>
      </div>
    </div>

    <div class="sfc-preferences" data-cookie-preferences hidden>
      <label class="sfc-choice">
        <input type="checkbox" checked disabled>
        <span>
          <strong>Essential</strong>
          <small>Always active for basic website functions and security.</small>
        </span>
      </label>

      <label class="sfc-choice">
        <input data-consent-category="preferences" name="preferences" type="checkbox">
        <span>
          <strong>Preferences</strong>
          <small>Remembers selected language or display choices.</small>
        </span>
      </label>

      <label class="sfc-choice">
        <input data-consent-category="analytics" name="analytics" type="checkbox">
        <span>
          <strong>Analytics</strong>
          <small>Helps us understand page use and improve the website.</small>
        </span>
      </label>

      <label class="sfc-choice">
        <input data-consent-category="external-media" name="external_media" type="checkbox">
        <span>
          <strong>External media</strong>
          <small>Allows selected embedded content or third-party features to load.</small>
        </span>
      </label>
    </div>

    <div class="sfc-actions">
      <button class="sfc-button sfc-button--primary" data-consent-action="accept-all" data-cookie-accept="" type="button">
        Accept optional cookies
      </button>

      <button class="sfc-button sfc-button--outline" data-consent-action="reject-optional" data-cookie-decline="" data-cookie-reject="" type="button">
        Reject optional cookies
      </button>

      <button type="button" class="sfc-button sfc-button--quiet" data-cookie-customize>
        Customise
      </button>

      <button class="sfc-button sfc-button--primary" data-consent-action="save" data-cookie-save="" hidden="" type="button">
        Save my choices
      </button>

      <button type="button" class="sfc-button sfc-button--quiet" data-cookie-reset hidden>
        Reset preferences
      </button>
    </div>
  </div>
</section>
