<section aria-label="Configurações de cookies" aria-live="polite" data-cookie-banner="" data-loaded-partial="cookie-banner" hidden="" id="sf-cookie-inline" role="dialog">
<div class="sfc-shell">
<div class="sfc-copy-wrap">
<span aria-hidden="true" class="sfc-dot"></span>
<div class="sfc-text">
<p class="sfc-title">Cookies neste site</p>
<p class="sfc-copy">
          Usamos tecnologias essenciais para o funcionamento do site. Com sua permissão, cookies opcionais podem ajudar a lembrar preferências, medir o uso do site ou carregar conteúdos externos selecionados.
        </p>
</div>
</div>
<div class="sfc-preferences" data-cookie-preferences="" hidden="">
<label class="sfc-choice">
<input checked="" disabled="" type="checkbox"/>
<span>
<strong>Essenciais</strong>
<small>Sempre ativos para as funções básicas e a segurança do site.</small>
</span>
</label>
<label class="sfc-choice">
<input data-consent-category="preferences" name="preferences" type="checkbox">
<span>
<strong>Preferências</strong>
<small>Lembram o idioma selecionado ou as opções de exibição.</small>
</span>
</label>
<label class="sfc-choice">
<input data-consent-category="analytics" name="analytics" type="checkbox">
<span>
<strong>Análise de uso</strong>
<small>Ajuda a entender como as páginas são usadas e a melhorar o site.</small>
</span>
</label>
<label class="sfc-choice">
<input data-consent-category="external-media" name="external_media" type="checkbox">
<span>
<strong>Mídia externa</strong>
<small>Permite carregar conteúdos incorporados selecionados ou recursos de terceiros.</small>
</span>
</label>
</div>
<div class="sfc-actions">
<button class="sfc-button sfc-button--primary" data-consent-action="accept-all" data-cookie-accept="" type="button">
        Aceitar cookies opcionais
      </button>
<button class="sfc-button sfc-button--outline" data-consent-action="reject-optional" data-cookie-decline="" data-cookie-reject="" type="button">
        Recusar cookies opcionais
      </button>
<button class="sfc-button sfc-button--quiet" data-cookie-customize="" type="button">
        Personalizar
      </button>
<button class="sfc-button sfc-button--primary" data-consent-action="save" data-cookie-save="" hidden="" type="button">
        Salvar minhas escolhas
      </button>
<button class="sfc-button sfc-button--quiet" data-cookie-reset="" hidden="" type="button">
        Redefinir preferências
      </button>
</div>
</div>
</section>
