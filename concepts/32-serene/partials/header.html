<header
  class="site-header public-header public-header-32 public-header-layout-centered atlas-public-header-32 visual-dna-header visual-dna-header-floating-pill-header"
  data-public-header="centered"
  data-layout-signature="32-serene-header-botanical-editorial"
  data-visual-dna-header-pattern="floating-pill-header"
  data-visual-dna-colour-rhythm="sage-open-ivory-deep"
>
  <div class="public-header-shell">
    <div
      class="public-nav-zone public-nav-left"
      data-navigation-slot="compact"
    ></div>
    <a
      class="brand-mark public-brand-mark"
      href="index.html"
      aria-label="Sofiati home"
    >
      <img
        src="../../assets/brand/sofiati-logo-primary-sage.png"
        alt="Sofiati"
      />
    </a>
    <div
      class="public-nav-zone public-nav-right"
      data-navigation-slot="primary"
    ></div>
    <div class="public-header-tools">
      <a class="header-consultation" href="consultation.html">Consultation</a>
      <button
        class="menu-button public-menu-button"
        type="button"
        data-menu-toggle
        aria-controls="mobile-menu"
        aria-expanded="false"
        aria-label="Open menu"
      >
        Menu
      </button>
    </div>
  </div>
  <div
    class="public-secondary-bar public-secondary-32"
    data-public-secondary="secondary-path"
  >
    <div data-navigation-slot="secondary-path"></div>
  </div>
</header>
