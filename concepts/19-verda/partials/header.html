<header
  class="site-header public-header public-header-19 public-header-layout-split atlas-public-header-19 visual-dna-header visual-dna-header-dark-premium-header"
  data-public-header="split"
  data-layout-signature="19-verda-header-calm-medical-spa"
  data-visual-dna-header-pattern="dark-premium-header"
  data-visual-dna-colour-rhythm="sage-panel-bronze-ivory"
>
  <div class="public-header-shell">
    <div
      class="public-nav-zone public-nav-left"
      data-navigation-slot="split-left"
    ></div>
    <a
      class="brand-mark public-brand-mark"
      href="index.html"
      aria-label="Sofiati home"
    >
      <img
        src="../../assets/brand/sofiati-logo-primary-sage.png"
        alt="Sofiati"
      />
    </a>
    <div
      class="public-nav-zone public-nav-right"
      data-navigation-slot="split-right"
    ></div>
    <div class="public-header-tools">
      <a class="header-consultation" href="consultation.html">Consultation</a>
      <button
        class="menu-button public-menu-button"
        type="button"
        data-menu-toggle
        aria-controls="mobile-menu"
        aria-expanded="false"
        aria-label="Open menu"
      >
        Menu
      </button>
    </div>
  </div>
  <div
    class="public-secondary-bar public-secondary-19"
    data-public-secondary="secondary-care"
  >
    <div data-navigation-slot="secondary-care"></div>
  </div>
</header>
