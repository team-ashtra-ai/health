<header
  class="site-header public-header public-header-28 public-header-layout-editorial atlas-public-header-28 visual-dna-header visual-dna-header-split-navigation-header architecture-header architecture-header-split-nav-header architecture-nav-journal-support-nav"
  data-public-header="editorial"
  data-layout-signature="28-pure-header-magazine-beauty"
  data-visual-dna-header-pattern="split-navigation-header"
  data-visual-dna-colour-rhythm="spa-sage-gold-cream"
  data-header-architecture="split-nav-header"
  data-navigation-architecture="journal-support-nav"
  data-architecture-contract="28-pure"
>
  <div class="public-header-shell">
    <div
      class="public-nav-zone public-nav-left"
      data-navigation-slot="compact"
    ></div>
    <a
      class="brand-mark public-brand-mark"
      href="index.html"
      aria-label="Sofiati home"
    >
      <img
        src="../../assets/brand/sofiati-logo-primary-sage.png"
        alt="Sofiati"
      />
    </a>
    <div
      class="public-nav-zone public-nav-right"
      data-navigation-slot="primary"
    ></div>
    <div class="public-header-tools">
      <a class="header-consultation" href="consultation.html">Consultation</a>
      <button
        class="menu-button public-menu-button"
        type="button"
        data-menu-toggle
        aria-controls="mobile-menu"
        aria-expanded="false"
        aria-label="Open menu"
      >
        Menu
      </button>
    </div>
  </div>
  <div
    class="public-secondary-bar public-secondary-28"
    data-public-secondary="secondary-care"
  >
    <div data-navigation-slot="secondary-care"></div>
  </div>
</header>
