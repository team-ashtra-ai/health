<section
  class="consultation-form-shell consultation-form-shell-33"
  data-form-route="consultation"
  data-layout-signature="33-elan-consultation-form-gold-minimalism"
>
  <img
    src="../../assets/brand/franciele-sofiati-18-balcony-orange-looking-up-transparent.webp"
    alt="Franciele Sofiati full-image Elan visual"
    aria-hidden="true"
    class="sofiati-photo sofiati-brand-photo"
    data-sofiati-photo="true"
    loading="eager"
    decoding="async"
  />
  <form>
    <label>Name<input name="name" autocomplete="name" /></label
    ><label>Message<textarea name="message"></textarea></label
    ><button type="submit">Request evaluation</button>
  </form>
</section>
