<section
  class="consultation-form-shell consultation-form-shell-20"
  data-form-route="consultation"
  data-layout-signature="20-halo-consultation-form-portrait-led-brand"
>
  <img
    src="../../assets/brand/franciele-sofiati-27-ivory-room-window-attentive-transparent.webp"
    alt="Franciele Sofiati full-image Halo visual"
    aria-hidden="true"
    class="sofiati-photo sofiati-brand-photo"
    data-sofiati-photo="true"
    loading="eager"
    decoding="async"

  <form>
    <label>Name<input name="name" autocomplete="name" /></label
