<form
  class="consultation-form consultation-form-42"
  data-consultation-form
  action="https://formspree.io/f/xzdldkjy"
  method="POST"
  novalidate
>
  <img
    class="form-botanical-frame"
    src="assets/forms/consultation-form-frame.svg"
    alt="Consultation-Form decorative visual in the Softline concept"
    aria-hidden="true"
  />
  <input
    type="text"
    name="_gotcha"
    tabindex="-1"
    autocomplete="off"
    class="honeypot"
    aria-hidden="true"
  />
  <label>Name<input name="name" autocomplete="name" required /></label>
  <label
    >WhatsApp<input name="whatsapp" autocomplete="tel" inputmode="tel" required
  /></label>
  <label
    >Email<input name="email" type="email" autocomplete="email" required
  /></label>
  <label
    >Treatment interest<select name="interest" required>
      <option value="">Select one</option>
      <option>Professional evaluation</option>
      <option>Laser care</option>
      <option>Skin care</option>
      <option>Results with responsibility</option>
    </select></label
  >
  <label class="message-field"
    >Message<textarea name="message" required></textarea>
  </label>
  <label class="consent-field"
    ><input type="checkbox" name="privacy_acknowledgement" required /> I
    understand this request does not replace individual professional
    evaluation.</label
  >
  <input type="hidden" name="source" value="Sofiati website" />
  <input
    type="hidden"
    name="_subject"
    value="Sofiati website consultation request"
  />
  <button
    class="button button-primary"
    type="submit"
    data-submit-label="Send request"
  >
    Send request
  </button>
  <p class="privacy-note">
    Your message is sent through Formspree and should not include sensitive
    medical details.
  </p>
  <p class="form-status" role="status" aria-live="polite"></p>
</form>
